# Netlify — frontend only; API runs on Render (https://ewc-erp.onrender.com)
[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  VITE_API_URL = "https://ewc-erp.onrender.com"
