services:
  - type: web
    name: ewc-erp
    runtime: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm run start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://ewc-erp.onrender.com
      # Set in Render dashboard (required):
      # MONGODB_URI — MongoDB Atlas connection string
      # JWT_SECRET — long random secret (never use the example value)
